# Full-autonomy content engine — runs every Monday AND Thursday at 14:03 UTC
# (09:03 ET / 06:03 PT). Each run:
#
#   1. Picks the next unshipped cluster topic from docs/seo-strategy.md
#   2. Pulls SERP context (Brave Search) + Foil scan/waitlist data
#   3. Drafts via Claude Sonnet 4.6 → runs 8 quality gates → retries up to 3x
#   4. On gate pass: writes to app/blog/posts/{slug}.mdx, refreshes internal
#      link suggestions, commits + pushes directly to main. Vercel auto-deploys.
#   5. On 3-strike failure: logs to Actions output, optional webhook, no commit.
#      Next scheduled run picks a different topic from the backlog.
#
# No PR step. No human review. The quality gates ARE the review. Kill-switch:
# set repo secret AUTO_PUBLISH_WEEKLY_POSTS=false to fall back to _pending/.

name: weekly-content
on:
  schedule:
    - cron: "3 14 * * 1" # Mondays 14:03 UTC
    - cron: "3 14 * * 4" # Thursdays 14:03 UTC
  workflow_dispatch: {}  # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Configure git author
        run: |
          git config user.name  "foil-content-bot"
          git config user.email "bot+content@foil.app"

      - name: Generate post (autonomous)
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTO_PUBLISH_WEEKLY_POSTS: ${{ vars.AUTO_PUBLISH_WEEKLY_POSTS || 'true' }}
          WEEKLY_POST_WEBHOOK_URL: ${{ secrets.WEEKLY_POST_WEBHOOK_URL }}
          # Newsletter draft step (ADR-011). Optional — if these are unset the
          # script logs + skips the draft generation without affecting the
          # blog publish. Drafts NEVER auto-send; they land in Beehiiv's
          # drafts list awaiting human review.
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
        # Exit code 2 = quality-gate exhaustion (logged + webhook sent).
        # Treat as "skip this run", not a workflow failure — the next cron will
        # try a different topic.
        run: |
          set +e
          node --experimental-strip-types scripts/generate-weekly-post.ts
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 0 ]; then exit 0; fi
          if [ "$code" -eq 2 ]; then
            echo "::warning::Quality gates exhausted after 3 retries — skipping commit"
            exit 0
          fi
          exit $code

      - name: Refresh internal links
        if: steps.generate.outputs.exit_code == '0'
        run: node --experimental-strip-types scripts/refresh-internal-links.ts || true

      - name: Refresh competitive gaps
        if: steps.generate.outputs.exit_code == '0'
        run: node --experimental-strip-types scripts/competitive-gap-scan.ts || true

      - name: Commit + push to main
        id: commit
        if: steps.generate.outputs.exit_code == '0'
        run: |
          git add app/blog/posts/ docs/
          if git diff --cached --quiet; then
            echo "Nothing to commit — generator may have written to _pending/ (kill-switch active)"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "feat(blog): autonomous weekly post $(date -u +%Y-%m-%d)"
          git push origin main
          echo "committed=true" >> "$GITHUB_OUTPUT"

      # The bot's GitHub identity isn't on the Vercel team, so the GitHub
      # integration rejects auto-commits authored by bot+content@foil.app.
      # Trigger production deploys explicitly via a Deploy Hook instead —
      # decouples publishing from team membership and respects the
      # AUTO_PUBLISH_WEEKLY_POSTS kill-switch automatically (no commit →
      # this step is skipped).
      #
      # See docs/DECISIONS.md ADR-008.
      - name: Trigger Vercel deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK_URL not set — commit landed on main but production will only deploy on the next manual trigger. See docs/DECISIONS.md ADR-008."
            exit 0
          fi
          response=$(curl -sS -o /tmp/deploy-resp -w "%{http_code}" -X POST "$VERCEL_DEPLOY_HOOK_URL")
          echo "Vercel deploy hook → HTTP $response"
          cat /tmp/deploy-resp || true
          # Deploy hooks return 200/201 with a job descriptor on success.
          # Anything else is unexpected; surface as a workflow warning but
          # don't fail the run — the commit is already on main and a manual
          # redeploy via Vercel UI is always available as a fallback.
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "::warning::Deploy hook returned unexpected status $response — trigger a manual deploy from Vercel UI if needed."
          fi
