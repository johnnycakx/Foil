# Weekly content engine — runs every Monday at 14:03 UTC (09:03 ET).
# Generates a draft blog post via Claude Sonnet 4.6, commits it to
# app/blog/posts/_pending/, and opens a pull request John can review in
# 5 minutes.
#
# Why a PR instead of a webhook ping: the review step IS the approval step,
# and Vercel auto-previews the branch. John reads the post in the preview
# deployment, merges if good, deletes the branch if not.
#
# Why 14:03 UTC: not :00 — every cron in the world hits the API at :00.
# A few minutes off keeps us out of the herd.

name: weekly-content
on:
  schedule:
    - cron: "3 14 * * 1" # Monday 14:03 UTC
  workflow_dispatch: {} # manual trigger from Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Generate draft post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WEEKLY_POST_WEBHOOK_URL: ${{ secrets.WEEKLY_POST_WEBHOOK_URL }}
        run: node --experimental-strip-types scripts/generate-weekly-post.ts

      - name: Refresh competitive gaps
        run: node --experimental-strip-types scripts/competitive-gap-scan.ts || true

      - name: Open review PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "feat(blog): weekly draft post (auto-generated)"
          title: "Weekly draft post — review & merge to publish"
          body: |
            Auto-generated by `scripts/generate-weekly-post.ts` via the
            `weekly-content` workflow. The draft is in
            `app/blog/posts/_pending/` — review it in the Vercel preview
            for this PR, then either:

            **To publish:** `git mv app/blog/posts/_pending/<slug>.mdx app/blog/posts/<slug>.mdx`,
            commit, and merge.

            **To skip:** close the PR; the draft stays in `_pending/` and
            next week's generator will skip the slug.

            See also `docs/competitive-gaps.md` for the latest competitor
            heading diff.
          branch: weekly-content/draft
          delete-branch: true
