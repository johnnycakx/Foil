# Full-autonomy content engine — runs every Monday AND Thursday at 14:03 UTC
# (09:03 ET / 06:03 PT). Each run:
#
#   1. Picks the next unshipped cluster topic from docs/seo-strategy.md
#   2. Pulls SERP context (Brave Search) + Foil scan/waitlist data
#   3. Drafts via Claude Sonnet 4.6 → runs 8 quality gates → retries up to 3x
#   4. On gate pass: writes to app/blog/posts/{slug}.mdx, refreshes internal
#      link suggestions, commits + pushes directly to main. Vercel auto-deploys.
#   5. On 3-strike failure: logs to Actions output, optional webhook, no commit.
#      Next scheduled run picks a different topic from the backlog.
#
# No PR step. No human review. The quality gates ARE the review. Kill-switch:
# set repo secret AUTO_PUBLISH_WEEKLY_POSTS=false to fall back to _pending/.

name: weekly-content
on:
  schedule:
    - cron: "3 14 * * 1" # Mondays 14:03 UTC
    - cron: "3 14 * * 4" # Thursdays 14:03 UTC
  workflow_dispatch: {}  # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Configure git author
        run: |
          git config user.name  "foil-content-bot"
          git config user.email "bot+content@foil.app"

      - name: Generate post (autonomous)
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUTO_PUBLISH_WEEKLY_POSTS: ${{ vars.AUTO_PUBLISH_WEEKLY_POSTS || 'true' }}
          WEEKLY_POST_WEBHOOK_URL: ${{ secrets.WEEKLY_POST_WEBHOOK_URL }}
          # Newsletter draft step (ADR-011). Optional — if these are unset the
          # script logs + skips the draft generation without affecting the
          # blog publish. Drafts NEVER auto-send; they land in Beehiiv's
          # drafts list awaiting human review.
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
          # Manual-paste fallback (ADR-012). Resend ships the paste-ready
          # draft to john.c.craig24@gmail.com after the .md artifact is
          # written. Send failure logs a warning but never blocks.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Discord notifications (ADR-014). #content-engine fires on every
          # successful publish; #errors fires on quality-gate exhaustion +
          # any soft-fail path. Both are optional — missing secrets just
          # skip the post.
          DISCORD_WEBHOOK_CONTENT_ENGINE: ${{ secrets.DISCORD_WEBHOOK_CONTENT_ENGINE }}
          DISCORD_WEBHOOK_ERRORS: ${{ secrets.DISCORD_WEBHOOK_ERRORS }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        # Exit code 2 = quality-gate exhaustion (logged + webhook sent).
        # Treat as "skip this run", not a workflow failure — the next cron will
        # try a different topic.
        run: |
          set +e
          node --experimental-strip-types scripts/generate-weekly-post.ts
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 0 ]; then exit 0; fi
          if [ "$code" -eq 2 ]; then
            echo "::warning::Quality gates exhausted after 3 retries — skipping commit"
            exit 0
          fi
          exit $code

      - name: Refresh internal links
        if: steps.generate.outputs.exit_code == '0'
        run: node --experimental-strip-types scripts/refresh-internal-links.ts || true

      - name: Refresh competitive gaps
        if: steps.generate.outputs.exit_code == '0'
        run: node --experimental-strip-types scripts/competitive-gap-scan.ts || true

      - name: Commit + push to main
        id: commit
        if: steps.generate.outputs.exit_code == '0'
        run: |
          # docs/ covers docs/newsletter-drafts/ (ADR-012 artifact path) too.
          git add app/blog/posts/ docs/
          if git diff --cached --quiet; then
            echo "Nothing to commit — generator may have written to _pending/ (kill-switch active)"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "feat(blog): autonomous weekly post $(date -u +%Y-%m-%d)"
          git push origin main
          echo "committed=true" >> "$GITHUB_OUTPUT"

      # NOTE (Session 47.4 / ADR-045): no explicit deploy step. The push above
      # is deployed by Vercel's standard GitHub integration like every other
      # commit to main. The previous "Trigger Vercel deploy" hook step (ADR-008)
      # was removed: it existed to work around a Vercel "Ignored Build Step"
      # command that skipped builds for bot+content@foil.app commits — but that
      # command ALSO blocked the hook's own build (same HEAD commit), so every
      # autonomous post produced two BLOCKED deploys and no Ready one. The fix
      # was to remove that ignore command at source (Vercel project setting),
      # which lets the bot's commits deploy via the git integration normally.
      # See docs/DECISIONS.md ADR-045 (supersedes ADR-008's hook approach).

      # On workflow failure (e.g. npm ci, checkout, env-loading failures the
      # script itself can't catch), ping #errors with the run URL so John
      # sees it without watching the Actions tab. Soft-fail via `|| true`.
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_ERRORS: ${{ secrets.DISCORD_WEBHOOK_ERRORS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_ERRORS" ]; then exit 0; fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PAYLOAD=$(jq -n \
            --arg url "$RUN_URL" \
            --arg ts "$TS" \
            '{username: "Foil Ops", embeds: [{title: ":warning: weekly-content workflow failed", description: "A GitHub Actions step failed before the script could send its own notification.", url: $url, color: 15548997, fields: [{name: "Workflow", value: "weekly-content", inline: true}, {name: "Run", value: ("[Open in GitHub](" + $url + ")"), inline: true}], timestamp: $ts}]}')
          curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_ERRORS" || true
